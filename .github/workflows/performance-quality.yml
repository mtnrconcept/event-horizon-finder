name: Performance and responsive quality gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: performance-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SUPABASE_URL: https://ci-placeholder.supabase.co
      SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder
      VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: TypeScript
        run: npm run typecheck

      - name: Recovered routes and application shell
        run: npm run check:routes

      - name: Existing automated tests
        run: |
          npm run test:map
          npm run test:mcp
          npm run test:i18n
          npm run test:translations
          npm run test:performance

      - name: Production build
        run: npm run build

      - name: Bundle budget
        run: npm run check:bundle

      - name: Vercel production build
        run: |
          npm run build:vercel
          test -f .vercel/output/config.json
          test -f .vercel/output/functions/__server.func/index.mjs
