name: Deploy production

on:
  workflow_run:
    workflows: ["Performance and responsive quality gate"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Check out the validated revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Validate deployment credentials
        shell: bash
        run: |
          required=(
            SUPABASE_ACCESS_TOKEN
            SUPABASE_DB_PASSWORD
            SUPABASE_PROJECT_ID
            VERCEL_ORG_ID
            VERCEL_PROJECT_ID
            VERCEL_TOKEN
          )
          for name in "${required[@]}"; do
            test -n "${!name}" || { echo "GitHub production secret $name is required" >&2; exit 1; }
          done

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link the production Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Preview pending database migrations
        run: supabase db push --dry-run

      - name: Apply pending database migrations
        run: supabase db push

      - name: Deploy repository Edge Functions
        run: supabase functions deploy

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull production Vercel configuration
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build the validated revision for Vercel
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy the prebuilt application to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
