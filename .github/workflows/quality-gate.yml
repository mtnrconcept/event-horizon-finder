name: Quality gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_URL: https://ci-placeholder.supabase.co
      SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder
      VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder
      SITE_URL: https://preview.example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: TypeScript
        run: npm run typecheck

      - name: MCP tests
        run: npm run test:mcp

      - name: Production build
        run: npm run build
