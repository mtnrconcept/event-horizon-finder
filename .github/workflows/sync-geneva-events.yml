name: Sync Geneva events

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

concurrency:
  group: sync-geneva-events
  cancel-in-progress: false

jobs:
  deploy-and-sync:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      GENEVA_SCRAPER_SECRET: ${{ secrets.GENEVA_SCRAPER_SECRET }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "SUPABASE_ACCESS_TOKEN is required" >&2; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "SUPABASE_DB_PASSWORD is required" >&2; exit 1; }
          test -n "$SUPABASE_PROJECT_ID" || { echo "SUPABASE_PROJECT_ID is required" >&2; exit 1; }
          test -n "$GENEVA_SCRAPER_SECRET" || { echo "GENEVA_SCRAPER_SECRET is required" >&2; exit 1; }

      - name: Resolve Supabase function URL
        run: |
          normalized_url="$(printf '%s' "${SUPABASE_URL:-}" | tr -d '\r\n' | sed 's/[[:space:]]*$//' | sed 's#/*$##')"
          if ! printf '%s' "$normalized_url" | grep -Eq '^https://[a-z0-9-]+\.supabase\.co$'; then
            normalized_url="https://${SUPABASE_PROJECT_ID}.supabase.co"
          fi
          echo "SUPABASE_FUNCTION_URL=${normalized_url}" >> "$GITHUB_ENV"

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Sync Geneva scraper secret to Edge Functions
        run: supabase secrets set GENEVA_SCRAPER_SECRET="$GENEVA_SCRAPER_SECRET"

      - name: Push database migrations
        run: supabase db push

      - name: Deploy Supabase Edge Functions
        run: |
          supabase functions deploy firecrawl-scrape-event-url
          supabase functions deploy firecrawl-webhook --no-verify-jwt
          supabase functions deploy scrape-geneva-events --no-verify-jwt

      - name: Trigger Geneva scraper Edge Function
        run: |
          curl --fail-with-body \
            --request POST \
            --header "Content-Type: application/json" \
            --header "x-geneva-scraper-secret: $GENEVA_SCRAPER_SECRET" \
            --data '{}' \
            "$SUPABASE_FUNCTION_URL/functions/v1/scrape-geneva-events"
