name: Continuous worldwide event sync

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy migrations and Edge Functions before syncing
        required: false
        default: true
        type: boolean
      direct_only:
        description: Use deterministic direct scraping (paid providers stay disabled)
        required: false
        default: true
        type: boolean
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sync-geneva-events.yml"
      - "scripts/**"
      - "supabase/**"
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: sync-world-events
  cancel-in-progress: false

jobs:
  deploy-and-sync:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      GENEVA_SCRAPER_SECRET: ${{ secrets.GENEVA_SCRAPER_SECRET }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js for precision tests
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Test the deterministic event normalizer
        run: node --test supabase/functions/_shared/*.test.ts

      - name: Validate required secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "SUPABASE_ACCESS_TOKEN is required" >&2; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "SUPABASE_DB_PASSWORD is required" >&2; exit 1; }
          test -n "$SUPABASE_PROJECT_ID" || { echo "SUPABASE_PROJECT_ID is required" >&2; exit 1; }
          normalized_geneva_secret="$(printf '%s' "$GENEVA_SCRAPER_SECRET" | tr -d '\r\n')"
          test -n "$normalized_geneva_secret" || { echo "GENEVA_SCRAPER_SECRET is required" >&2; exit 1; }

      - name: Resolve Supabase function URL
        run: |
          normalized_url="$(printf '%s' "${SUPABASE_URL:-}" | tr -d '\r\n' | sed 's/[[:space:]]*$//' | sed 's#/*$##')"
          if ! printf '%s' "$normalized_url" | grep -Eq '^https://[a-z0-9-]+\.supabase\.co$'; then
            normalized_url="https://${SUPABASE_PROJECT_ID}.supabase.co"
          fi
          echo "SUPABASE_FUNCTION_URL=${normalized_url}" >> "$GITHUB_ENV"

      - name: Set up Supabase CLI
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy)
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy)
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Sync Geneva scraper secret to Edge Functions
        if: github.event_name == 'workflow_dispatch' && inputs.deploy
        run: supabase secrets set GENEVA_SCRAPER_SECRET="$GENEVA_SCRAPER_SECRET"

      # The protected-branch Supabase integration is the single automatic
      # deployer on pushes. This dry run keeps GitHub CI as a migration guard
      # without racing a second db push against the native deployment.
      - name: Preview database migrations
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy)
        run: supabase db push --dry-run

      - name: Push database migrations
        if: github.event_name == 'workflow_dispatch' && inputs.deploy
        timeout-minutes: 60
        run: supabase db push

      - name: Sync Geneva scraper Edge Function secrets
        if: github.event_name == 'workflow_dispatch' && inputs.deploy
        run: |
          normalized_geneva_secret="$(printf '%s' "$GENEVA_SCRAPER_SECRET" | tr -d '\r\n')"
          supabase secrets set "GENEVA_SCRAPER_SECRET=$normalized_geneva_secret"

      - name: Deploy Supabase Edge Functions
        if: github.event_name == 'workflow_dispatch' && inputs.deploy
        run: |
          supabase functions deploy scrape-geneva-events --no-verify-jwt

      - name: Test the Geneva Python collector
        run: python3 -m unittest tests/test_scrape_geneva_events.py

      - name: Scrape all due worldwide event sources in resilient batches
        timeout-minutes: 330
        env:
          DIRECT_ONLY: true
        run: |
          extra_args=()
          if [ "$DIRECT_ONLY" = "true" ]; then
            extra_args+=(--direct-only)
          fi
          python3 scripts/scrape_geneva_events.py --batch-size 4 --max-batches 80 "${extra_args[@]}"
