<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#171624" />
    <title>Global Party — Hors ligne</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100dvh; display: grid; place-items: center; padding: 24px; background: radial-gradient(circle at 20% 0%, #49307c 0, transparent 42%), #171624; color: #faf9ff; }
      main { width: min(520px, 100%); padding: 32px; border: 1px solid rgba(255,255,255,.12); border-radius: 28px; background: rgba(30,29,45,.88); box-shadow: 0 20px 60px rgba(0,0,0,.35); text-align: center; }
      img { width: 72px; height: 72px; object-fit: contain; }
      h1 { margin: 20px 0 8px; font-size: clamp(28px, 8vw, 42px); }
      p { margin: 0; line-height: 1.65; color: #bbb8cb; }
      button { min-height: 48px; margin-top: 24px; border: 0; border-radius: 999px; padding: 0 24px; background: #a276ff; color: #171624; font-weight: 800; cursor: pointer; }
    </style>
  </head>
  <body>
    <main>
      <img src="/brand/global-party-logo.png" alt="Global Party" />
      <h1>Connexion indisponible</h1>
      <p>Les pages publiques déjà consultées peuvent rester accessibles. Reconnecte-toi pour actualiser les événements, la carte et tes favoris.</p>
      <button type="button" onclick="location.reload()">Réessayer</button>
    </main>
  </body>
</html>
